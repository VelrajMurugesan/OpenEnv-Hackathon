name: gst-invoice-compliance-checker
version: "1.0.0"
description: >
  An OpenEnv environment where AI agents audit Indian GST (Goods and Services Tax)
  invoices for compliance violations. The agent examines invoices for missing fields,
  invalid formats, tax calculation errors, inter/intra-state tax logic, e-way bill
  compliance, reverse charge mechanism, and composition scheme violations.
  Tasks progress from basic field validation (easy) to complex multi-invoice
  batch audits (hard).

author: OpenEnv Hackathon Team
license: MIT

# ── Environment API ─────────────────────────────────────────────────────────

api:
  base_path: /
  endpoints:
    info:
      method: GET
      path: /info
      description: Return environment metadata and available tasks
    tasks:
      method: GET
      path: /tasks
      description: List all available tasks
    reset:
      method: POST
      path: /reset
      description: Initialize a new session with a specific task
      request_body:
        task_id: string
    state:
      method: GET
      path: /state
      description: Return current environment state
    step:
      method: POST
      path: /step
      description: Submit an agent action
      request_body:
        action:
          action: "flag_issue | approve | submit_report"
          invoice_id: string
          field: string
          category: string
          severity: string
          description: string
    grade:
      method: GET
      path: /grade
      description: Return grader result after submission

# ── Observation Space ───────────────────────────────────────────────────────

observation_space:
  type: object
  properties:
    task_id: { type: string }
    task_description: { type: string }
    difficulty: { type: string, enum: [easy, medium, hard] }
    invoices: { type: array, items: { type: object } }
    findings: { type: array, items: { type: object } }
    step_count: { type: integer }
    max_steps: { type: integer }
    done: { type: boolean }
    score: { type: number, nullable: true }

# ── Action Space ────────────────────────────────────────────────────────────

action_space:
  type: object
  properties:
    action:
      type: string
      enum: [flag_issue, approve, submit_report]
      description: >
        flag_issue: Report a compliance violation on a specific invoice.
        approve: Mark an invoice as compliant.
        submit_report: Finalize the audit and receive a score.
    invoice_id: { type: string, description: "Target invoice ID" }
    field: { type: string, description: "Field name with the issue" }
    category:
      type: string
      enum: [missing_field, invalid_format, wrong_value, tax_mismatch, compliance_violation, inconsistency, duplicate]
    severity:
      type: string
      enum: [critical, major, minor]
    description: { type: string, description: "Human-readable issue description" }

# ── Reward Signal ───────────────────────────────────────────────────────────

reward:
  range: [0.0, 1.0]
  description: >
    F1 score with severity weighting.
    Precision = correctly flagged issues / all flagged issues (penalizes false positives).
    Recall = correctly flagged issues / all actual issues (penalizes missed issues).
    Severity weights: critical=3x, major=2x, minor=1x.

# ── Tasks ───────────────────────────────────────────────────────────────────

tasks:
  - id: easy_1
    name: Missing Field Detection
    difficulty: easy
    description: Audit a B2B invoice for missing mandatory fields
    max_steps: 15

  - id: easy_2
    name: GSTIN Format & Code Validation
    difficulty: easy
    description: Check GSTIN formats, state codes, and date formats
    max_steps: 15

  - id: easy_3
    name: Tax Rate vs HSN Code Mismatch
    difficulty: easy
    description: Identify incorrect tax rates for HSN/SAC codes
    max_steps: 15

  - id: medium_1
    name: Inter/Intra-State Tax Logic
    difficulty: medium
    description: Validate IGST vs CGST+SGST based on supply direction
    max_steps: 20

  - id: medium_2
    name: Arithmetic & GSTIN Consistency
    difficulty: medium
    description: Check calculations and GSTIN-state code consistency
    max_steps: 20

  - id: medium_3
    name: E-way Bill & Compliance Checks
    difficulty: medium
    description: Validate e-way bill requirements and regulatory compliance
    max_steps: 20

  - id: hard_1
    name: Reverse Charge & Composition Scheme
    difficulty: hard
    description: Audit for RCM violations and composition scheme restrictions
    max_steps: 25

  - id: hard_2
    name: Batch Audit with Duplicates
    difficulty: hard
    description: Multi-invoice audit with duplicate detection
    max_steps: 30

  - id: hard_3
    name: Full Compliance Audit
    difficulty: hard
    description: Comprehensive audit combining all validation types on 5 invoices
    max_steps: 35

# ── Infrastructure ──────────────────────────────────────────────────────────

infrastructure:
  runtime: python3.11
  framework: fastapi
  deployment: huggingface-spaces
  dockerfile: ./Dockerfile
  inference_script: ./inference.py
  config_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
